<header class="h-20 bg-white flex items-center justify-between px-4 md:px-8">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 truncate" id="page-title">Tiện ích</h1>
    <div class="flex items-center space-x-4 md:space-x-6">
        <div class="flex space-x-2 sm:space-x-3">
            <button class="flex items-center justify-center bg-white border border-gray-100 rounded-lg sm:rounded-xl w-10 h-10 sm:w-auto sm:h-auto sm:px-4 sm:py-2.5 shadow-sm hover:shadow-md transition active:scale-95" title="Lịch tuần">
                <img src="/assets/images/lich-tuan-header-icon.svg" class="w-5 h-5 sm:mr-2" alt="icon">
                <span class="hidden sm:inline text-sm font-semibold text-gray-700">Lịch tuần</span>
            </button>
            <button class="flex items-center justify-center bg-white border border-gray-100 rounded-lg sm:rounded-xl w-10 h-10 sm:w-auto sm:h-auto sm:px-4 sm:py-2.5 shadow-sm hover:shadow-md transition active:scale-95" title="Hỗ trợ kỹ thuật">
                <img src="/assets/images/ho-tro-ky-thuat-header-icon.svg" class="w-5 h-5 sm:mr-2" alt="icon">
                <span class="hidden sm:inline text-sm font-semibold text-gray-700">Hỗ trợ kỹ thuật</span>
            </button>
        </div>

        <button class="relative text-gray-500 hover:text-gray-700 transition active:scale-95 mx-1 sm:mx-2">
            <i class="fas fa-bell text-lg sm:text-xl"></i>
        </button>

        <div class="flex items-center space-x-2 sm:space-x-3 pl-1 sm:pl-2">
            <img src="@Model.UserAvatar" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full border border-gray-100 object-cover cursor-pointer" onclick="logout()" title="Click để đăng xuất">
            <div class="hidden sm:flex flex-col text-left">
                <p class="text-sm font-bold text-gray-900 leading-tight">@Model.UserName</p>
                <p class="text-xs text-gray-500 font-medium">@Model.UserRole</p>
            </div>
        </div>
    </div>
</header>
