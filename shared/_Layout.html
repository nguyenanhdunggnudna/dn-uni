<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Văn bản</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* Đảm bảo scroll mượt mà */
        #content-placeholder { scroll-behavior: smooth; }
        
        /* Utility for Mock logic */
        .hidden-role { display: none !important; }
    </style>
    <!-- Mock Data Configuration -->
    <script src="../shared/mock-data.js"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <div id="sidebar-placeholder"></div>

    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
        
        <div id="header-placeholder"></div>

        <div id="content-placeholder" class="flex-1 overflow-y-auto">
            </div>

    </main>

<script>
    /**
     * Mock Razor Engine: Thay thế các biến @Model.Var bằng dữ liệu thật
     */
    function renderRazor(html) {
        const roleData = window.MOCK_DATA.roles[window.MOCK_DATA.currentRole];
        if (!roleData) return html;

        // 1. Thay thế biến @Model.VariableName
        let rendered = html;
        Object.keys(roleData).forEach(key => {
            const placeholder = `@Model.${key}`;
            rendered = rendered.split(placeholder).join(roleData[key]);
        });

        // 2. Giả lập logic Role-based visibility
        // Tìm các đoạn <!-- @if (User.IsInRole("...")) { --> ... <!-- } -->
        // Cú pháp hỗ trợ: @if (User.IsInRole("Role1") || User.IsInRole("Role2"))
        const regexBlock = /<!--\s*@if\s*\((.*?)\)\s*{\s*-->([\s\S]*?)<!--\s*}\s*-->/g;
        rendered = rendered.replace(regexBlock, (match, condition, content) => {
            const currentRole = window.MOCK_DATA.currentRole;
            // Kiểm tra xem currentRole có xuất hiện trong condition không
            // Đây là bản hack đơn giản cho mockup
            if (condition.includes(`"${currentRole}"`) || condition.includes(`'${currentRole}'`)) {
                return content;
            } else {
                return "";
            }
        });

        return rendered;
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    /**
     * Khởi tạo Layout: Nạp các thành phần dùng chung khi vừa mở web
     */
    async function initLayout() {
        // Kiểm tra login mockup
        if (!localStorage.getItem('isLoggedIn') && !window.location.href.includes('login.html')) {
            window.location.href = '../pages/login.html';
            return;
        }

        try {
            // 1. Nạp Sidebar
            const sideRes = await fetch('../components/_Sidebar.html'); 
            if (!sideRes.ok) throw new Error('Không tìm thấy file Sidebar');
            const sideHtml = await sideRes.text();
            document.getElementById('sidebar-placeholder').innerHTML = renderRazor(sideHtml);
            
            // 2. Nạp Header
            const headRes = await fetch('../components/_Header.html');
            if (!headRes.ok) throw new Error('Không tìm thấy file Header');
            const headHtml = await headRes.text();
            document.getElementById('header-placeholder').innerHTML = renderRazor(headHtml);
            
            // 3. Nạp trang mặc định khi vừa vào hệ thống
            loadPage('../pages/incoming-documents/index.html');
            
            console.log("Hệ thống .NET Mock đã sẵn sàng!");
        } catch (err) {
            console.error("Lỗi khởi động hệ thống:", err);
            document.body.innerHTML = `<div class="p-20 text-red-500 font-bold text-center">Lỗi nghiêm trọng: ${err.message}. Kiểm tra lại cấu thư mục!</div>`;
        }
    }

    /**
     * Hàm nạp nội dung trang con
     */
    async function loadPage(pagePath) {
        try {
            const response = await fetch(pagePath);
            if (!response.ok) throw new Error('Không tìm thấy nội dung trang: ' + pagePath);
            const html = await response.text();
            
            // Cập nhật nội dung vào placeholder sau khi render qua Razor Mock
            const contentArea = document.getElementById('content-placeholder');
            contentArea.innerHTML = renderRazor(html);
            contentArea.scrollTop = 0; 

            updatePageTitle(pagePath);
            
            console.log("Chuyển trang thành công: " + pagePath);
        } catch (err) {
            console.error("Lỗi nạp trang:", err);
            document.getElementById('content-placeholder').innerHTML = 
                `<div class="p-10 text-red-500 bg-red-50 m-6 rounded-lg border border-red-200">
                    <h3 class="font-bold">Lỗi nạp nội dung</h3>
                    <p>${err.message}</p>
                </div>`;
        }
    }

    function updatePageTitle(path) {
        const titleElement = document.getElementById('page-title');
        if (!titleElement) return;

        if (path.includes('incoming-documents')) {
            titleElement.innerText = 'Sổ văn bản';
        } else if (path.includes('internal-news')) {
            titleElement.innerText = 'Tin nội bộ';
        } else if (path.includes('home')) {
            titleElement.innerText = 'Trang chủ';
        } else {
            titleElement.innerText = 'Hệ thống Quản lý';
        }
    }

    function logout() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userRole');
        window.location.href = '../pages/login.html';
    }

    function toggleSidebarMenu(menuId) {
        const menu = document.getElementById(menuId);
        const arrow = document.getElementById('arrow-' + menuId);
        if (!menu) return;

        if (menu.style.maxHeight === '0px' || !menu.style.maxHeight) {
            menu.style.maxHeight = menu.scrollHeight + "px";
            if(arrow) arrow.style.transform = 'rotate(90deg)';
        } else {
            menu.style.maxHeight = '0px';
            if(arrow) arrow.style.transform = 'rotate(0deg)';
        }
    }

    initLayout();
</script>
</body>
</html>
