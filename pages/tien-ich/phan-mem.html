<div class="px-8 py-6 space-y-6">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <h1 class="text-2xl font-bold text-on-surface">Phần mềm</h1>
        <button class="p-2.5 bg-surface-container-lowest text-on-surface-variant hover:text-primary hover:shadow-md rounded-lg transition-all flex items-center justify-center border border-outline-variant/10">
            <span class="material-symbols-outlined">refresh</span>
        </button>
    </div>

    <!-- Main Data Table Card -->
    <div class="bg-surface-container-lowest rounded-[1rem] shadow-[0_32px_64px_-12px_rgba(43,52,55,0.06)] overflow-hidden border border-outline-variant/5">
        <div class="overflow-x-auto text-[14px]">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-surface-container-high border-b border-outline-variant/20">
                        <th class="px-6 py-4 font-bold tracking-wider text-on-surface-variant w-24">Số</th>
                        <th class="px-6 py-4 font-bold tracking-wider text-on-surface-variant">Tiêu đề</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-outline-variant/10">
                    <tr class="hover:bg-blue-50/30 transition-colors border-b border-outline-variant/10">
                        <td class="px-6 py-4 text-on-surface">1</td>
                        <td class="px-6 py-4 text-on-surface-variant font-medium">Tên tiêu đề 1</td>
                    </tr>
                    <tr class="hover:bg-blue-50/30 transition-colors border-b border-outline-variant/10">
                        <td class="px-6 py-4 text-on-surface">2</td>
                        <td class="px-6 py-4 text-on-surface-variant font-medium">Tên tiêu đề 2</td>
                    </tr>
                    <tr class="hover:bg-blue-50/30 transition-colors border-b border-outline-variant/10">
                        <td class="px-6 py-4 text-on-surface">3</td>
                        <td class="px-6 py-4 text-on-surface-variant font-medium">Tên tiêu đề 3</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Pagination Footer -->
        <div class="px-6 py-5 flex flex-col md:flex-row items-center justify-between gap-4 border-t border-surface-container-high bg-surface-container-lowest text-[14px] text-on-surface-variant">
            <div>
                Hiển thị 1-10 trong tổng số 1000 mục
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-2">
                    <span>Số hàng mỗi trang</span>
                    <div class="relative">
                        <select class="appearance-none bg-surface-container-lowest border border-outline-variant/20 rounded-lg px-3 py-1.5 pr-8 focus:ring-2 focus:ring-primary transition-all outline-none">
                            <option>10</option>
                            <option>20</option>
                            <option>50</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[16px] pointer-events-none">expand_more</span>
                    </div>
                </div>
                <nav class="flex items-center gap-1">
                    <button class="p-1.5 text-on-surface-variant hover:bg-surface-container border border-outline-variant/20 rounded-lg transition-colors disabled:opacity-30" disabled>
                        <span class="material-symbols-outlined text-[18px]">chevron_left</span>
                    </button>
                    <button class="w-8 h-8 flex items-center justify-center rounded-lg bg-blue-50 border border-blue-500 text-blue-600 font-medium shadow-sm">1</button>
                    <button class="w-8 h-8 flex items-center justify-center rounded-lg text-on-surface-variant hover:bg-surface-container border border-outline-variant/20 transition-colors">2</button>
                    <button class="w-8 h-8 flex items-center justify-center rounded-lg text-on-surface-variant hover:bg-surface-container border border-outline-variant/20 transition-colors">3</button>
                    <span class="px-1 text-on-surface-variant">...</span>
                    <button class="w-8 h-8 flex items-center justify-center rounded-lg text-on-surface-variant hover:bg-surface-container border border-outline-variant/20 transition-colors">10</button>
                    <button class="p-1.5 text-on-surface-variant hover:bg-surface-container border border-outline-variant/20 rounded-lg transition-colors">
                        <span class="material-symbols-outlined text-[18px]">chevron_right</span>
                    </button>
                </nav>
            </div>
        </div>
    </div>
</div>
