<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8">
    <h1 class="text-xl font-bold text-gray-800">Tin nội bộ</h1>
    <div class="flex items-center space-x-6">
        <div class="flex space-x-2">
            <button class="flex items-center px-4 py-2 border border-gray-300 rounded-md text-sm hover:bg-gray-50">
                <i class="far fa-calendar-alt mr-2 text-blue-600"></i> Lịch tuần
            </button>
            <button class="flex items-center px-4 py-2 border border-gray-300 rounded-md text-sm hover:bg-gray-50">
                <i class="far fa-question-circle mr-2 text-blue-600"></i> Hỗ trợ kỹ thuật
            </button>
        </div>
        <div class="flex items-center space-x-3 border-l pl-6">
            <div class="text-right">
                <p class="text-sm font-semibold text-gray-800">Ngọc Vũ</p>
                <p class="text-xs text-gray-500">Giám đốc</p>
            </div>
            <img src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full border border-gray-200">
        </div>
    </div>
</header>

<section class="p-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-6">Tin công khai</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Tìm kiếm..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-1 focus:ring-blue-500 outline-none text-sm">
                </div>
                <select class="border border-gray-300 rounded-md px-4 py-2 text-sm text-gray-600 outline-none">
                    <option>Tháng</option>
                </select>
                <select class="border border-gray-300 rounded-md px-4 py-2 text-sm text-gray-600 outline-none">
                    <option>Năm</option>
                </select>
                <div class="flex justify-end">
                    <button class="p-2 border border-gray-300 rounded-md hover:bg-gray-50">
                        <i class="fas fa-sync-alt text-gray-500"></i>
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 uppercase text-[11px] font-bold tracking-wider">
                            <th class="px-4 py-4 border-b">STT</th>
                            <th class="px-4 py-4 border-b">Tiêu đề</th>
                            <th class="px-4 py-4 border-b">Người gửi</th>
                            <th class="px-4 py-4 border-b">Ngày gửi <i class="fas fa-sort-down ml-1"></i></th>
                            <th class="px-4 py-4 border-b text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-700">
                        <tr class="hover:bg-blue-50/30 transition border-b border-gray-100">
                            <td class="px-4 py-4">1</td>
                            <td class="px-4 py-4 text-blue-600 hover:underline font-medium cursor-pointer">File tin công khai 1</td>
                            <td class="px-4 py-4">Thịnh Nguyễn</td>
                            <td class="px-4 py-4 text-gray-500">03/25/2023</td>
                            <td class="px-4 py-4 text-center">
                                <div class="flex justify-center space-x-3 text-sm">
                                    <button class="text-blue-500 hover:text-blue-700"><i class="far fa-edit"></i></button>
                                    <button class="text-red-500 hover:text-red-700"><i class="far fa-trash-alt"></i></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-6 flex items-center justify-between text-xs text-gray-500">
                <p>Showing 1-10 of 100 items</p>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <span>Rows per page</span>
                        <select class="border border-gray-300 rounded px-2 py-1 outline-none">
                            <option>10</option>
                        </select>
                    </div>
                    <div class="flex border border-gray-300 rounded-md">
                        <button class="px-3 py-1 border-r hover:bg-gray-50"><i class="fas fa-chevron-left"></i></button>
                        <button class="px-4 py-1 bg-blue-600 text-white">1</button>
                        <button class="px-3 py-1 border-l hover:bg-gray-50"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
