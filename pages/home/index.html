<script>
    // Live clock logic
    function updateClock() {
        const now = new Date();
        const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
        const day = days[now.getDay()];
        const time = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const date = now.toLocaleDateString('vi-VN');
        const clockEl = document.getElementById('live-clock');
        if (clockEl) {
            clockEl.innerHTML = `<i class="fa-regular fa-clock mr-1"></i> ${day}, ${time} | ${date}`;
        }
    }

    // Update immediately and then every second
    updateClock();
    const clockInterval = setInterval(updateClock, 1000);

    // Clean up interval when loading another page to prevent memory leak
    // Save reference in content placeholder to track page transitions
    const contentArea = document.getElementById('content-placeholder');
    if (contentArea) {
        // Clear previous interval if exists
        if (window.activeClockInterval) {
            clearInterval(window.activeClockInterval);
        }
        window.activeClockInterval = clockInterval;
    }
</script>
