<div class="px-8 py-6 space-y-6">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <button onclick="loadPage('../pages/calendar/phong-hop.html')" class="p-2 bg-surface-container hover:bg-surface-container-high rounded-full transition text-on-surface flex items-center justify-center">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
            </button>
            <h1 class="text-xl font-extrabold text-on-surface tracking-tight font-manrope">Chỉnh sửa Phòng họp</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="loadPage('../pages/calendar/phong-hop.html')" class="px-5 py-2 bg-surface-container hover:bg-surface-container-high text-on-surface rounded-lg text-xs font-bold transition">
                Hủy bỏ
            </button>
            <button onclick="saveEditRoom()" class="px-5 py-2 bg-primary hover:bg-primary-dim text-on-primary rounded-lg text-xs font-bold transition shadow-sm">
                Lưu thay đổi
            </button>
        </div>
    </div>

    <!-- Form Container -->
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 p-6 space-y-6">
        <h2 class="text-sm font-bold text-primary uppercase tracking-wide">Thông tin phòng họp</h2>
        
        <form id="edit-room-form" class="space-y-6" onsubmit="event.preventDefault(); saveEditRoom();">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Tên phòng -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant">Tên phòng họp <span class="text-red-500">*</span></label>
                    <input type="text" id="edit-room-name" value="Phòng họp nhỏ" required class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-xs font-medium" />
                </div>

                <!-- Số thứ tự -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant">Số thứ tự <span class="text-red-500">*</span></label>
                    <input type="number" id="edit-room-order" value="1" required class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-xs font-medium" />
                </div>

                <!-- Sức chứa -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant">Sức chứa (Người) <span class="text-red-500">*</span></label>
                    <input type="text" id="edit-room-capacity" value="15 - 20 người" required class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-xs font-medium" />
                </div>

                <!-- Vị trí -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant">Vị trí (Tầng / Tòa nhà)</label>
                    <input type="text" id="edit-room-location" value="Tầng 3 - Nhà A" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl py-3 px-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-xs font-medium" />
                </div>
            </div>

            <!-- Thiết bị đi kèm (Checkboxes) -->
            <div class="space-y-3">
                <label class="text-xs font-bold text-on-surface-variant">Trang thiết bị có sẵn</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <label class="flex items-center gap-2.5 cursor-pointer group p-3 bg-surface-container-low/50 hover:bg-surface-container-low rounded-xl transition border border-outline-variant/10">
                        <input type="checkbox" checked class="rounded text-primary focus:ring-primary/20" />
                        <span class="text-xs font-semibold text-on-surface">Máy chiếu (Projector)</span>
                    </label>
                    <label class="flex items-center gap-2.5 cursor-pointer group p-3 bg-surface-container-low/50 hover:bg-surface-container-low rounded-xl transition border border-outline-variant/10">
                        <input type="checkbox" checked class="rounded text-primary focus:ring-primary/20" />
                        <span class="text-xs font-semibold text-on-surface">Màn hình Tivi lớn</span>
                    </label>
                    <label class="flex items-center gap-2.5 cursor-pointer group p-3 bg-surface-container-low/50 hover:bg-surface-container-low rounded-xl transition border border-outline-variant/10">
                        <input type="checkbox" checked class="rounded text-primary focus:ring-primary/20" />
                        <span class="text-xs font-semibold text-on-surface">Hệ thống âm thanh</span>
                    </label>
                    <label class="flex items-center gap-2.5 cursor-pointer group p-3 bg-surface-container-low/50 hover:bg-surface-container-low rounded-xl transition border border-outline-variant/10">
                        <input type="checkbox" class="rounded text-primary focus:ring-primary/20" />
                        <span class="text-xs font-semibold text-on-surface">Bảng viết di động</span>
                    </label>
                </div>
            </div>

            <!-- Ghi chú -->
            <div class="space-y-2">
                <label class="text-xs font-bold text-on-surface-variant">Ghi chú / Quy định sử dụng</label>
                <textarea rows="4" placeholder="Nhập ghi chú hoặc quy định sử dụng phòng họp..." class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl p-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-xs font-medium resize-none"></textarea>
            </div>
        </form>
    </div>
</div>

<!-- Beautiful Custom Success Dialog -->
<div id="custom-success-modal" class="fixed inset-0 bg-black/60 z-[99999] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 space-y-5 shadow-2xl border border-gray-100 transform scale-95 transition-transform duration-300">
        <div class="flex flex-col items-center text-center space-y-3">
            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600">
                <span class="material-symbols-outlined text-3xl">check_circle</span>
            </div>
            <h3 id="success-modal-title" class="text-base font-extrabold text-[#333] font-manrope">Thành công</h3>
            <p id="success-modal-text" class="text-xs text-gray-500 font-medium leading-relaxed">Thao tác đã được thực hiện thành công.</p>
        </div>
        <div class="flex pt-1">
            <button onclick="closeSuccessDialog()" class="flex-1 py-2.5 px-4 bg-[#0069D9] hover:bg-[#0056b3] text-white rounded-xl text-xs font-bold transition shadow-md">Đóng</button>
        </div>
    </div>
</div>

<script>
    let successDialogCallback = null;

    function saveEditRoom() {
        showSuccessDialog("Thành công", "Lưu thay đổi thông tin phòng họp thành công!", () => {
            loadPage('../pages/calendar/phong-hop.html');
        });
    }

    function showSuccessDialog(title, message, callback = null) {
        const modal = document.getElementById('custom-success-modal');
        document.getElementById('success-modal-title').innerText = title;
        document.getElementById('success-modal-text').innerText = message;
        successDialogCallback = callback;
        
        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modal.querySelector('div').classList.remove('scale-95');
        }, 50);
    }

    function closeSuccessDialog() {
        const modal = document.getElementById('custom-success-modal');
        modal.classList.add('opacity-0');
        modal.querySelector('div').classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
            if (successDialogCallback) {
                successDialogCallback();
                successDialogCallback = null;
            }
        }, 300);
    }
</script>
